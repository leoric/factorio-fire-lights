[mod-setting-description]
fl-fire-size-multiplier=Additional multiplier to further change the size of new fire lights. 0 to Disable.
fl-fire-spread-multiplier=Multiplies fire spreading values. Usually only applies to forest fires.
fl-expl-size-multiplier=Additional multiplier to further change the size of new explosion lights. 0 to Disable.
fl-nuke-effect-multiplier=Additional multiplier to modify the camera flash effect when the vanilla nuke goes off. 0 to Disable.
fl-proj-size-multiplier=Additional multiplier to further change the size of new projectile lights. 0 to Disable.
fl-flash-size-multiplier=Additional multiplier to further change the size of flashlights. 0 to Disable.
fl-silo-size-multiplier=Additional multiplier to further change the size of the silo lights. 0 to Disable.
fl-disable-unit-onmap=Remove biters, spitters, and other modded enemy units from the map and minimap.
fl-nerf-nightvision=Changes nightvision so that it doesn't completely nullify the effects of this mod. (Darker than vanilla nights.)
fl-darker-nightvision=Darkens nightvision even more so that more of the night is scarier. Requires Rebalanced Nightvision.
fl-disable-hit-explosion=Removes the on-hit lights that are created when a bullet collides with something. Performance option.
